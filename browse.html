<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Browse listings — AmaarBazar</title>
<meta name="description" content="Browse and filter thousands of listings across Bangladesh on AmaarBazar.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="nav scrolled">
  <div class="container nav__bar">
    <a href="index.html" class="logo">
      <span class="logo__mark">A</span>
      <span><span class="logo__text">Amaar<b>Bazar</b></span><br>
      <span class="nav__tagline" data-i18n="brand.tagline">Bangladesh's Marketplace</span></span>
    </a>
    <nav class="nav__links">
      <a href="browse.html" class="nav__link" data-i18n="nav.browse">Browse</a>
      <a href="index.html#categories" class="nav__link" data-i18n="nav.categories">Categories</a>
      <a href="index.html#how" class="nav__link" data-i18n="nav.how">How it works</a>
    </nav>
    <div class="nav__actions">
      <button class="lang-toggle" data-lang-toggle>🌐 <span data-i18n="lang.toggle">বাংলা</span></button>
      <a href="#" class="nav__link" data-i18n="nav.login">Log in</a>
      <a href="post.html" class="btn btn--primary" data-i18n="nav.post">Post an Ad</a>
      <button class="nav__burger" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </div>
</header>
<nav class="nav__mobile">
  <a href="browse.html" data-i18n="nav.browse">Browse</a>
  <a href="index.html#categories" data-i18n="nav.categories">Categories</a>
  <a href="post.html" class="btn btn--primary" style="margin-top:1rem;justify-content:center" data-i18n="nav.post">Post an Ad</a>
</nav>

<section class="page-top">
  <div class="container page-top__inner">
    <h1 data-i18n="browse.title">Browse listings</h1>
    <p data-i18n="cat.sub">Thousands of listings across every category you can imagine.</p>
  </div>
</section>

<div class="container">
  <div class="browse-wrap">
    <!-- Filters -->
    <aside class="filters">
      <h3>⚙️ <span data-i18n="browse.filters">Filters</span></h3>
      <div class="field">
        <label data-i18n="browse.category">Category</label>
        <select id="fCat">
          <option value="" data-i18n="browse.all">All categories</option>
          <option value="vehicles" data-i18n="cat.vehicles">Vehicles</option>
          <option value="property" data-i18n="cat.property">Property</option>
          <option value="forsale" data-i18n="cat.forsale">For Sale</option>
          <option value="jobs" data-i18n="cat.jobs">Jobs</option>
          <option value="services" data-i18n="cat.services">Services</option>
          <option value="electronics" data-i18n="cat.electronics">Electronics</option>
          <option value="pets" data-i18n="cat.pets">Pets</option>
          <option value="community" data-i18n="cat.community">Community</option>
        </select>
      </div>
      <div class="field">
        <label data-i18n="browse.price">Price range (৳)</label>
        <div class="field-row">
          <input id="fMin" type="number" min="0" data-i18n-ph="browse.min" placeholder="Min">
          <input id="fMax" type="number" min="0" data-i18n-ph="browse.max" placeholder="Max">
        </div>
      </div>
      <div class="field">
        <label data-i18n="browse.location">Location</label>
        <input id="fLoc" type="text" data-i18n-ph="hero.location_ph" placeholder="All Bangladesh">
      </div>
      <button class="btn btn--primary btn--block" id="applyFilters" style="margin-bottom:.6rem"><span data-i18n="browse.apply">Apply filters</span></button>
      <button class="btn btn--outline btn--block" id="resetFilters"><span data-i18n="browse.reset">Reset</span></button>
    </aside>

    <!-- Results -->
    <main>
      <div class="browse-head">
        <div class="browse-count" id="browseCount"></div>
        <div class="browse-sort">
          <span data-i18n="browse.sort">Sort by</span>
          <select id="fSort">
            <option value="new" data-i18n="browse.sort_new">Newest first</option>
            <option value="low" data-i18n="browse.sort_low">Price: low to high</option>
            <option value="high" data-i18n="browse.sort_high">Price: high to low</option>
          </select>
        </div>
      </div>
      <div class="listing-grid" id="browseGrid"></div>
    </main>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer__bottom"><span data-i18n="foot.rights">© 2026 AmaarBazar. All rights reserved. Made in Bangladesh 🇧🇩</span></div>
  </div>
</footer>

<script src="js/i18n.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
