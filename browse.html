<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Browse listings — AmaarBazaar</title>
<meta name="description" content="Browse and filter thousands of listings across Bangladesh on AmaarBazaar.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="nav scrolled">
  <div class="container nav__bar">
    <a href="index.html" class="logo">
      <span class="logo__mark"><svg class="lily" viewBox="0 0 48 48" aria-hidden="true"><g fill="#fff"><path d="M24 34C16 25 16 14 24 6 32 14 32 25 24 34Z" opacity=".5" transform="rotate(-70 24 34)"/><path d="M24 34C16 25 16 14 24 6 32 14 32 25 24 34Z" opacity=".5" transform="rotate(70 24 34)"/><path d="M24 34C20 25 21 15 24 8 27 15 28 25 24 34Z" transform="rotate(-46 24 34)"/><path d="M24 34C20 25 21 15 24 8 27 15 28 25 24 34Z" transform="rotate(-23 24 34)"/><path d="M24 34C20 25 21 15 24 8 27 15 28 25 24 34Z"/><path d="M24 34C20 25 21 15 24 8 27 15 28 25 24 34Z" transform="rotate(23 24 34)"/><path d="M24 34C20 25 21 15 24 8 27 15 28 25 24 34Z" transform="rotate(46 24 34)"/></g><circle cx="24" cy="31.5" r="3" fill="#f5a623"/></svg></span>
      <span><span class="logo__text">Amaar<b>Bazaar</b></span><br>
      <span class="nav__tagline" data-i18n="brand.tagline">Bangladesh's Marketplace</span></span>
    </a>
    <nav class="nav__links">
      <a href="browse.html" class="nav__link" data-i18n="nav.browse">Browse</a>
      <a href="index.html#categories" class="nav__link" data-i18n="nav.categories">Categories</a>
      <a href="index.html#how" class="nav__link" data-i18n="nav.how">How it works</a>
    </nav>
    <div class="nav__actions">
      <button class="lang-toggle" data-lang-toggle>🌐 <span data-i18n="lang.toggle">বাংলা</span></button>
      <a href="#" class="nav__link" data-i18n="nav.login">Log in</a>
      <a href="post.html" class="btn btn--primary" data-i18n="nav.post">Post an Ad</a>
      <button class="nav__burger" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </div>
</header>
<nav class="nav__mobile">
  <a href="browse.html" data-i18n="nav.browse">Browse</a>
  <a href="index.html#categories" data-i18n="nav.categories">Categories</a>
  <a href="post.html" class="btn btn--primary" style="margin-top:1rem;justify-content:center" data-i18n="nav.post">Post an Ad</a>
</nav>

<section class="page-top">
  <div class="container page-top__inner">
    <h1 data-i18n="browse.title">Browse listings</h1>
    <p data-i18n="cat.sub">Thousands of listings across every category you can imagine.</p>
  </div>
</section>

<div class="container">
  <div class="browse-wrap">
    <!-- Filters -->
    <aside class="filters">
      <h3>⚙️ <span data-i18n="browse.filters">Filters</span></h3>
      <div class="field">
        <label data-i18n="browse.category">Category</label>
        <select id="fCat">
          <option value="" data-i18n="browse.all">All categories</option>
          <optgroup label="🚗 Cars & Vehicles" data-i18n="group.vehicles">
            <option value="cars" data-i18n="cat.cars">Cars</option>
            <option value="motorcycles" data-i18n="cat.motorcycles">Motorcycles</option>
            <option value="commercial" data-i18n="cat.commercial">Commercial Vehicles</option>
            <option value="auto_parts" data-i18n="cat.auto_parts">Auto Parts</option>
            <option value="bicycles" data-i18n="cat.bicycles">Bicycles</option>
          </optgroup>
          <optgroup label="🏠 Property" data-i18n="group.property">
            <option value="property_sale" data-i18n="cat.property_sale">Property for Sale</option>
            <option value="property_rent" data-i18n="cat.property_rent">Property to Rent</option>
            <option value="commercial_rent" data-i18n="cat.commercial_rent">Commercial Space</option>
            <option value="flatmates" data-i18n="cat.flatmates">Flatmates</option>
          </optgroup>
          <optgroup label="💻 For Sale" data-i18n="group.forsale">
            <option value="electronics" data-i18n="cat.electronics">Electronics</option>
            <option value="mobiles" data-i18n="cat.mobiles">Mobile Phones</option>
            <option value="computers" data-i18n="cat.computers">Computers</option>
            <option value="tablets" data-i18n="cat.tablets">Tablets</option>
            <option value="cameras" data-i18n="cat.cameras">Cameras</option>
            <option value="tv_audio" data-i18n="cat.tv_audio">TV & Audio</option>
            <option value="gaming" data-i18n="cat.gaming">Gaming</option>
            <option value="furniture" data-i18n="cat.furniture">Furniture</option>
            <option value="appliances" data-i18n="cat.appliances">Appliances</option>
            <option value="kitchenware" data-i18n="cat.kitchenware">Kitchenware</option>
            <option value="home_decor" data-i18n="cat.home_decor">Home Décor</option>
            <option value="bedding" data-i18n="cat.bedding">Bedding</option>
            <option value="fashion" data-i18n="cat.fashion">Fashion</option>
            <option value="footwear" data-i18n="cat.footwear">Footwear</option>
            <option value="jewelry" data-i18n="cat.jewelry">Jewelry</option>
            <option value="watches" data-i18n="cat.watches">Watches</option>
            <option value="bags" data-i18n="cat.bags">Bags</option>
          </optgroup>
          <optgroup label="⚽ Sports & Hobbies" data-i18n="group.sports">
            <option value="sports" data-i18n="cat.sports">Sports</option>
            <option value="outdoor" data-i18n="cat.outdoor">Outdoor</option>
            <option value="fitness" data-i18n="cat.fitness">Fitness</option>
            <option value="musical" data-i18n="cat.musical">Musical Instruments</option>
            <option value="books" data-i18n="cat.books">Books</option>
            <option value="toys" data-i18n="cat.toys">Toys</option>
            <option value="collectibles" data-i18n="cat.collectibles">Collectibles</option>
          </optgroup>
          <optgroup label="🛠️ Services" data-i18n="group.services">
            <option value="services" data-i18n="cat.services">Services</option>
            <option value="lessons" data-i18n="cat.lessons">Lessons</option>
            <option value="tutoring" data-i18n="cat.tutoring">Tutoring</option>
            <option value="repair" data-i18n="cat.repair">Repair</option>
            <option value="moving" data-i18n="cat.moving">Moving</option>
          </optgroup>
          <optgroup label="💼 Jobs" data-i18n="group.jobs">
            <option value="jobs" data-i18n="cat.jobs">Jobs</option>
            <option value="jobs_fulltime" data-i18n="cat.jobs_fulltime">Full-time</option>
            <option value="jobs_parttime" data-i18n="cat.jobs_parttime">Part-time</option>
            <option value="freelance" data-i18n="cat.freelance">Freelance</option>
          </optgroup>
          <optgroup label="🎓 Education" data-i18n="group.education">
            <option value="education" data-i18n="cat.education">Education</option>
            <option value="courses" data-i18n="cat.courses">Courses</option>
            <option value="skills" data-i18n="cat.skills">Skills</option>
          </optgroup>
          <optgroup label="🐾 Pets" data-i18n="group.pets">
            <option value="pets" data-i18n="cat.pets">Pets</option>
            <option value="pet_supplies" data-i18n="cat.pet_supplies">Pet Supplies</option>
          </optgroup>
          <optgroup label="🌾 Agriculture & Livestock" data-i18n="group.agriculture">
            <option value="livestock" data-i18n="cat.livestock">Livestock</option>
            <option value="agriculture" data-i18n="cat.agriculture">Agriculture</option>
            <option value="farming_tools" data-i18n="cat.farming_tools">Farming Tools</option>
            <option value="aquaculture" data-i18n="cat.aquaculture">Aquaculture</option>
          </optgroup>
          <optgroup label="🤝 Community" data-i18n="group.community">
            <option value="events" data-i18n="cat.events">Events</option>
            <option value="groups" data-i18n="cat.groups">Groups</option>
            <option value="lost_found" data-i18n="cat.lost_found">Lost & Found</option>
            <option value="community" data-i18n="cat.community">Community</option>
          </optgroup>
          <optgroup label="📦 Miscellaneous" data-i18n="group.misc">
            <option value="wanted" data-i18n="cat.wanted">Wanted</option>
            <option value="exchange" data-i18n="cat.exchange">Exchange</option>
            <option value="other" data-i18n="cat.other">Other</option>
          </optgroup>
        </select>
      </div>
      <div class="field">
        <label data-i18n="browse.price">Price range (৳)</label>
        <div class="field-row">
          <input id="fMin" type="number" min="0" data-i18n-ph="browse.min" placeholder="Min">
          <input id="fMax" type="number" min="0" data-i18n-ph="browse.max" placeholder="Max">
        </div>
      </div>
      <div class="field">
        <label data-i18n="browse.location">Location</label>
        <input id="fLoc" type="text" data-i18n-ph="hero.location_ph" placeholder="All Bangladesh">
      </div>
      <button class="btn btn--primary btn--block" id="applyFilters" style="margin-bottom:.6rem"><span data-i18n="browse.apply">Apply filters</span></button>
      <button class="btn btn--outline btn--block" id="resetFilters"><span data-i18n="browse.reset">Reset</span></button>
    </aside>

    <!-- Results -->
    <main>
      <div class="browse-head">
        <div class="browse-count" id="browseCount"></div>
        <div class="browse-sort">
          <span data-i18n="browse.sort">Sort by</span>
          <select id="fSort">
            <option value="new" data-i18n="browse.sort_new">Newest first</option>
            <option value="low" data-i18n="browse.sort_low">Price: low to high</option>
            <option value="high" data-i18n="browse.sort_high">Price: high to low</option>
          </select>
        </div>
      </div>
      <div class="listing-grid" id="browseGrid"></div>
    </main>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer__bottom"><span data-i18n="foot.rights">© 2026 AmaarBazaar. All rights reserved. Made in Bangladesh 🇧🇩</span></div>
  </div>
</footer>

<script src="js/i18n.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
